# ============================================
# CONFIGURACIÓN DEL PROYECTO
# ============================================
project:
  type: book
  output-dir: _book
  render:
    - "*.qmd"

# ============================================
# METADATOS EDITORIALES Y BIBLIOGRÁFICOS
# ============================================
book:
  title: "Título completo del libro"
  subtitle: "Subtítulo opcional"
  editor:
    - name: "Nombre del Coordinador"
      affiliation: "Institución del Coordinador"
      email: "un.correo@institución.com"
      orcid: "0000-0000-0000-0000"  # opcional pero recomendado
  publisher: "Universidad Autónoma Metropolitana, Unidad Lerma"
  publisher-place: "Lerma de Villada, Estado de México"
  date: "2026-05-31"  # formato ISO 8601: AAAA-MM-DD
  isbn: "978-xxx-xxx-xxx-x"
  doi: "10.xxxx/xxxxx"  # si ya está asignado
  license: "CC BY-NC-SA 4.0"  # o la que corresponda
  chapters:
    - index.qmd

# ============================================
# CONFIGURACIÓN DE SALIDA PDF
# ============================================
format:
  pdf:
    title-page: false            # Desactiva la generación automática para usar la plantilla .tex
    pdf-engine: xelatex
    lang: es                     # CRÍTICO: debe estar bajo format: pdf para polyglossia
    documentclass: scrbook
    papersize: "170mm x 240mm"
    fontsize: 12pt
    geometry: "left=3.5cm,right=3.5cm,top=3.5cm,bottom=3.5cm"
    mainfont: "Roboto"           # Reemplaza la carga manual de fontspec
    
    # Inyección tipográfica y de maquetación
    include-in-header:
      text: |
        \usepackage{graphicx}
        \graphicspath{{assets/imagenes/}{../../institucionales/assets/logos/}}
        \usepackage{setspace}
        \setstretch{1.5}
        \addtokomafont{disposition}{\linespread{1.2}\selectfont}
        \RedeclareSectionCommand[
          beforeskip=0.5cm,      % Espacio entre el final de la portadilla/créditos y "Introducción"
          afterskip=0.5cm        % Espacio entre "Introducción" y la línea siguiente (autor o texto)
        ]{chapter}
    
    # Inserción de portada personalizada
    include-before-body: portada.tex
    
    # Estructura y navegación
    toc: true
    toc-depth: 2
    toc-title: "Índice"
    number-sections: true
    reference-section-title: "Referencias Bibliográficas"
    lof-title: "Índice de Figuras"
    lot-title: "Índice de Tablas"
    lof: false
    lot: false

    # Bibliografía y citas (COMÚN A TODOS LOS CAPÍTULOS)
    csl: estilos/apa-6th-edition-es.csl
    bibliography: plantilla_bibliografia.bib  # Archivo unificado en raíz
    